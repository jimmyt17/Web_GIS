<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PFAS in Lincoln Surface Water</title>
    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.26/esri/themes/dark/main.css"
    />
    <script src="https://js.arcgis.com/4.26/"></script>

    <style>
      html, body, #viewDiv {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      #legendDiv {
        position: absolute;
        top: 10px;
        right: 10px;
        background-color: white;
        padding: 10px;
        border-radius: 5px;
        font-family: Arial, sans-serif;
        font-size: 14px;
        box-shadow: 0 0 5px rgba(0,0,0,0.3);
      }
      .legend-item {
        display: flex;
        align-items: center;
        margin-bottom: 5px;
      }
      .legend-color {
        width: 20px;
        height: 20px;
        margin-right: 5px;
        border: 1px solid #000;
      }
    </style>
  </head>

  <body>
    <div id="viewDiv"></div>

    <div id="legendDiv">
      <strong>PFAS Levels</strong>
      <div class="legend-item">
        <div class="legend-color" style="background-color: rgba(6, 36, 121, 0.6)"></div>
        Low (non-detectable to 4 ppt)
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background-color: rgba(229, 233, 11, 0.7)"></div>
        Moderate (4 ppt to 70 ppt)
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background-color: rgba(228, 10, 10, 0.8)"></div>
        High (>70 ppt)
      </div>
    </div>

    <script>
      require([
  "esri/Map",
  "esri/views/MapView",
  "esri/layers/GeoJSONLayer"
], function(Map, MapView, GeoJSONLayer) {

  // --- Declare watershed layer once ---
  const watershedLayer = new GeoJSONLayer({
    title: "Watersheds",
    url:
      "https://gis.lincoln.ne.gov/public/rest/services/LTUWatershed/WatershedBasins/MapServer/0/query?" +
      "where=1=1&outFields=*&f=geojson",
    renderer: {
      type: "simple",
      symbol: {
        type: "simple-fill",
        color: [0, 0, 0, 0.0], // semi-transparent green
        outline: { color: [0, 0, 0], width: 1 }
      }
    }
  });

  // --- PFAS layer ---
  const surfaceWaterLayer = new GeoJSONLayer({
    url: "https://jimmyt17.github.io/Web_GIS/FinalProject/surfacewater2.geojson",
    title: "Surface Water",
    renderer: {
      type: "simple",
      symbol: {
        type: "simple-fill",
        color: [200, 200, 200, 0.6],
        outline: { color: [0,0,100], width: 1.5 }
      },
      visualVariables: [
        {
          type: "color",
          field: "pfas_level",
          stops: [
            { value: 0, color: [6, 36, 121, 0.6], label: "Low" },
            { value: 4, color: [6, 36, 121, 0.6] },
            { value: 5, color: [229, 233, 11, 0.7], label: "Moderate" },
            { value: 70, color: [229, 233, 11, 0.7] },
            { value: 71, color: [228, 10, 10, 0.8], label: "High" }
          ]
        }
      ]
    },
    popupTemplate: {
      title: "{NAME}",
      content: `
        <b>Name:</b> {NAME}<br>
        <b>PFAS Level:</b> {pfas_level} ppt<br>
        <b>Acres:</b> {ACRES}<br>
        <b>Type:</b> {TYPE}
      `
    }
  });

  // --- Map ---
  const map = new Map({
    basemap: "gray-vector",
    layers: [watershedLayer, surfaceWaterLayer] // order: watershed behind PFAS
  });

  const view = new MapView({
    container: "viewDiv",
    map: map,
    center: [-96.78, 40.81],
    zoom: 12
  });

  // --- Toggle checkbox ---
  const toggle = document.getElementById("toggleWatershed");
  toggle.addEventListener("change", function() {
    watershedLayer.visible = this.checked;
  });

});
    </script>
  </body>
</html>
